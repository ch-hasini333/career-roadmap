        function renderNavs() {
            const hNav = document.getElementById('horizontal-nav');
            const vNav = document.getElementById('vertical-nav');

            // Render Horizontal (Dark Bar)
            hNav.innerHTML = CONTENT_DATA.map((item, index) => `
                <button onclick="loadContent(${index})" 
                    class="h-btn-${index} px-5 py-3 text-[15px] font-medium text-white hover:bg-black uppercase tracking-wide transition-colors">
                    ${item.heading.replace(/[^\x00-\x7F]/g, "") || item.heading} 
                </button>
            `).join('');

           
            loadContent(0); // Load first item
        }

        function loadContent(index) {
            const data = CONTENT_DATA[index];
            document.getElementById('display-heading').innerText = data.heading;
            document.getElementById('importance-text').innerText = data.importance;
            document.getElementById('main-content').innerHTML = data.content;


            // Reset and Set Active states
            document.querySelectorAll('[class*="h-btn-"]').forEach(el => el.classList.remove('active-horiz'));
            document.querySelectorAll('[class*="v-btn-"]').forEach(el => el.classList.remove('active-vert', 'bg-blue-50', 'border-blue-100'));
            
            document.querySelector(`.h-btn-${index}`).classList.add('active-horiz');
            const vBtn = document.querySelector(`.v-btn-${index}`);
            vBtn.classList.add('active-vert');
        }

        window.onload = renderNavs;
    </script>
